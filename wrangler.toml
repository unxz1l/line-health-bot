name = "line-health-bot"
main = "src/index.js"
compatibility_date = "2024-09-23"

# UTC 00:00 = TST 08:00 (morning exercise)
# UTC 13:00 = TST 21:00 (evening meds)
[triggers]
crons = ["0 0 * * *", "0 13 * * *"]

# All secrets set via CLI (never commit real values):
#   npx wrangler secret put LINE_CHANNEL_SECRET
#   npx wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
#   npx wrangler secret put GROQ_API_KEY
#   npx wrangler secret put USER_IDS              # comma-separated, e.g. "Uxxxx,Uyyyy"
#   npx wrangler secret put USER_NICKNAMES         # JSON, e.g. '{"Uxxxx":"媽媽","Uyyyy":"爸爸"}'
